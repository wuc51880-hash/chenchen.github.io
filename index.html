<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI猫导航</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(135deg,#e0e7ff,#f8fafc);
}

/* 高级卡片 */
.glass{
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  border-radius:20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* 卡片hover */
.card:hover{
  transform: translateY(-6px) scale(1.02);
  transition: 0.3s;
}

/* 渐变按钮 */
.btn{
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}
</style>
</head>

<body class="p-6 font-sans">

<div class="grid grid-cols-[240px_1fr] gap-6">

<!-- 左侧 -->
<div class="glass p-5 flex flex-col justify-between">

  <div>
    <h1 class="text-xl font-bold text-indigo-600 mb-6">
      🐱 AI猫导航
    </h1>

    <div class="space-y-4">
      <div class="p-3 rounded-xl hover:bg-white cursor-pointer">🏠 首页</div>
      <div class="p-3 rounded-xl hover:bg-white cursor-pointer">🤖 AI工具</div>
      <div class="p-3 rounded-xl hover:bg-white cursor-pointer">📚 分类</div>
    </div>
  </div>

  <div class="glass p-4 text-sm">
    <div class="font-semibold">😺 喵～需要帮助吗？</div>
    <div class="text-gray-500">我可以帮你找AI工具</div>
  </div>

</div>

<!-- 主区域 -->
<div class="space-y-6">

<!-- 标题 -->
<div class="glass p-6">
  <h1 class="text-4xl font-bold">
    发现最佳 <span class="text-indigo-500">AI工具</span>
  </h1>

  <input id="search"
    class="mt-4 w-full p-4 rounded-xl border-0 outline-none shadow-inner"
    placeholder="🔍 搜索 AI 工具..." />
</div>

<!-- 内容 -->
<div class="grid grid-cols-3 gap-6">

<!-- 工具 -->
<div class="col-span-2 glass p-5">
  <h2 class="mb-4 font-bold">🔥 热门工具</h2>
  <div id="tools" class="grid grid-cols-2 gap-4"></div>
</div>

<!-- 天气 -->
<div class="glass p-5">
  <h3 class="font-semibold mb-2">🌤 天气</h3>
  <div id="weather" class="text-4xl font-bold"></div>
  <div id="city" class="text-gray-500"></div>
</div>

<!-- 时钟 -->
<div class="glass p-5 text-center">
  <h3 class="font-semibold">⏰ 时钟</h3>
  <div id="clock" class="text-4xl mt-2 font-bold"></div>
</div>

</div>
</div>
</div>

<script>
const tools = [
  {name:"ChatGPT",desc:"AI对话",url:"https://chat.openai.com"},
  {name:"Claude",desc:"AI助手",url:"https://claude.ai"},
  {name:"Midjourney",desc:"AI绘画",url:"https://midjourney.com"},
  {name:"Runway",desc:"AI视频",url:"https://runwayml.com"},
  {name:"Notion AI",desc:"AI写作",url:"https://notion.so"},
  {name:"Perplexity",desc:"AI搜索",url:"https://perplexity.ai"}
];

function render(list){
  const el = document.getElementById("tools");
  el.innerHTML = "";
  list.forEach(t=>{
    el.innerHTML += `
      <a href="${t.url}" target="_blank"
         class="glass p-4 card block">
        <div class="font-semibold">${t.name}</div>
        <div class="text-sm text-gray-500">${t.desc}</div>
      </a>
    `;
  });
}
render(tools);

search.oninput = e=>{
  const v = e.target.value.toLowerCase();
  render(tools.filter(t=>t.name.toLowerCase().includes(v)));
};

setInterval(()=>{
  clock.innerText = new Date().toLocaleTimeString();
},1000);

fetch("https://wttr.in/?format=j1")
.then(r=>r.json())
.then(d=>{
  weather.innerText = d.current_condition[0].temp_C+"°";
  city.innerText = d.current_condition[0].weatherDesc[0].value;
});
</script>

</body>
</html>
